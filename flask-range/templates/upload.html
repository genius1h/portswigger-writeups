{% extends "base.html" %}
{% block title %}文件上传{% endblock %}
{% block content %}
<div class="card">
    <h2>文件上传 <span class="vuln-tag">高危</span></h2>
    <p>上传文件没有做任何类型校验。可以直接上传 WebShell。</p>
    <form method="POST" action="/upload" enctype="multipart/form-data">
        <label>选择文件</label>
        <input type="file" name="file" style="margin-bottom:14px;">
        <button type="submit">上传</button>
    </form>
    {% if msg %}<div class="flash success">{{ msg }}</div>{% endif %}
    {% if file_url %}
    <div class="output">文件地址：<a href="{{ file_url }}" target="_blank" style="color:#38bdf8;">{{ file_url }}</a></div>
    {% endif %}
</div>
{% endblock %}
