{% extends "base.html" %}
{% block title %}XSS 存储型{% endblock %}
{% block content %}
<div class="card">
    <h2>XSS - 存储型</h2>
    <p>用户提交的内容被持久化存储，其他用户访问时会执行。</p>
    <form method="POST" action="/xss/stored">
        <label>发布内容</label>
        <textarea name="content" rows="3" placeholder='&lt;script&gt;document.cookie&lt;/script&gt;'></textarea>
        <button type="submit">发布</button>
    </form>
    {% if posts %}
    <hr style="border-color:#334155;margin:16px 0;">
    <h3 style="color:#94a3b8;font-size:14px;margin-bottom:8px;">已发布的内容：</h3>
    {% for p in posts %}
    <div class="output" style="margin-bottom:8px;">{{ p|safe }}</div>
    {% endfor %}
    {% endif %}
</div>
{% endblock %}
