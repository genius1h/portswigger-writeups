{% extends "base.html" %}
{% block title %}SQL 注入 - 登录绕过{% endblock %}
{% block content %}
<div class="card">
    <h2>SQL 注入 - 登录绕过 <span class="vuln-tag">高危</span></h2>
    <p>用户名和密码直接拼接到 SQL 查询中，没有做任何转义。</p>
    <p style="font-size:12px;color:#64748b;">后台 SQL：SELECT * FROM users WHERE username='...' AND password='...'</p>
    {% if msg %}<div class="output">{{ msg }}</div>{% endif %}
    <form method="POST">
        <label>用户名</label>
        <input type="text" name="username" placeholder="admin' OR '1'='1">
        <label>密码</label>
        <input type="password" name="password" placeholder="随便填">
        <button type="submit">登录</button>
    </form>
</div>
{% endblock %}
