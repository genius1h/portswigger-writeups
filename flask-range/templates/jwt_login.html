{% extends "base.html" %}
{% block title %}JWT 登录{% endblock %}
{% block content %}
<div class="card">
    <h2>JWT - 弱密钥伪造</h2>
    <p>JWT 使用弱密钥 <code style="background:#0f172a;padding:2px 6px;border-radius:4px;color:#a5f3fc;">secret</code> 签名。登录后访问 /jwt/admin 进入管理后台。</p>
    <p style="font-size:12px;color:#64748b;">提示：用 Burp 拦截 Token，在 Decoder 中解码查看 Payload，然后用 hashcat 爆破密钥。</p>
    <form method="POST" action="/jwt/login">
        <label>用户名</label>
        <input type="text" name="username" value="guest">
        <button type="submit">登录并获取 JWT</button>
    </form>
</div>
{% endblock %}
