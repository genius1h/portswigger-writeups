{% extends "base.html" %}
{% block title %}SSRF 请求{% endblock %}
{% block content %}
<div class="card">
    <h2>SSRF - 服务端请求伪造</h2>
    <p>服务端会直接请求你提供的 URL 并返回响应内容。可用来探测内网。</p>
    <form method="POST" action="/ssrf/fetch">
        <label>目标 URL</label>
        <input type="url" name="url" value="http://127.0.0.1:5000/" placeholder="http://内网IP:端口/">
        <button type="submit">请求</button>
    </form>
    {% if content %}<div class="output">{{ content }}</div>{% endif %}
    {% if error %}<div class="flash error">{{ error }}</div>{% endif %}
</div>
{% endblock %}
