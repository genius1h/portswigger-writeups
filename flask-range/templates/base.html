<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Flask 靶场{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .nav { background: #1e293b; padding: 12px 24px; display: flex; gap: 16px; flex-wrap: wrap; border-bottom: 1px solid #334155; align-items: center; }
        .nav a { color: #94a3b8; text-decoration: none; font-size: 14px; padding: 4px 10px; border-radius: 4px; transition: all .15s; }
        .nav a:hover { color: #38bdf8; background: #334155; }
        .nav .brand { color: #38bdf8; font-weight: 600; font-size: 16px; margin-right: 16px; }
        .nav .badge { background: #dc2626; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 8px; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
        .card h2 { color: #f1f5f9; margin-bottom: 16px; font-size: 18px; }
        .card p { color: #94a3b8; margin-bottom: 12px; font-size: 14px; line-height: 1.6; }
        label { display: block; color: #cbd5e1; font-size: 14px; margin-bottom: 6px; font-weight: 500; }
        input[type=text], input[type=password], input[type=url], textarea { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 14px; margin-bottom: 14px; }
        input[type=text]:focus, input[type=password]:focus, input[type=url]:focus, textarea:focus { outline: none; border-color: #38bdf8; }
        button, .btn { background: #2563eb; color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background .15s; }
        button:hover { background: #1d4ed8; }
        .output { background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 14px; margin-top: 14px; font-family: "Cascadia Code", "Fira Code", monospace; font-size: 13px; white-space: pre-wrap; word-break: break-all; color: #a5f3fc; }
        .vuln-tag { display: inline-block; background: #dc2626; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; font-weight: 600; }
        table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 14px; }
        th { color: #94a3b8; font-weight: 500; }
        .flash { background: #1e3a5f; border: 1px solid #2563eb; border-radius: 6px; padding: 12px; margin-bottom: 16px; font-size: 14px; }
        .flash.success { border-color: #16a34a; background: #14532d; }
        .flash.error { border-color: #dc2626; background: #450a0a; }
    </style>
</head>
<body>
    <nav class="nav">
        <span class="brand">FLASK 靶场</span>
        <a href="/">首页</a>
        <a href="/sqli/login">SQL注入 <span class="badge">高危</span></a>
        <a href="/xss/reflected">XSS(反射)</a>
        <a href="/xss/stored">XSS(存储)</a>
        <a href="/csrf/transfer">CSRF</a>
        <a href="/ssrf/fetch">SSRF</a>
        <a href="/rce/ping">命令注入 <span class="badge">高危</span></a>
        <a href="/upload">文件上传 <span class="badge">高危</span></a>
        <a href="/jwt/login">JWT</a>
        <a href="/idor/profile">IDOR</a>
        <a href="/pickle">反序列化 <span class="badge">高危</span></a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
