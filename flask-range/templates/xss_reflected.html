{% extends "base.html" %}
{% block title %}XSS 反射型{% endblock %}
{% block content %}
<div class="card">
    <h2>XSS - 反射型</h2>
    <p>用户输入直接渲染到页面，没有 HTML 转义。</p>
    <form method="POST" action="/xss/reflected">
        <label>输入你的名字</label>
        <input type="text" name="name" placeholder='&lt;script&gt;alert(1)&lt;/script&gt;'>
        <button type="submit">提交</button>
    </form>
    {% if name %}
    <div class="output">你好，{{ name|safe }}</div>
    {% endif %}
</div>
{% endblock %}
