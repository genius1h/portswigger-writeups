{% extends "base.html" %}
{% block title %}IDOR 越权{% endblock %}
{% block content %}
<div class="card">
    <h2>IDOR - 水平越权</h2>
    <p>用户资料接口只靠 URL 参数 <code style="background:#0f172a;padding:2px 6px;border-radius:4px;color:#a5f3fc;">user_id</code> 区分用户，没有权限校验。</p>
    <p style="font-size:12px;color:#64748b;">修改 URL 中的 user_id 参数即可查看其他用户的资料。</p>
    <table>
        <tr><th>字段</th><th>值</th></tr>
        <tr><td>用户 ID</td><td>{{ user_id }}</td></tr>
        <tr><td>邮箱</td><td>{{ email }}</td></tr>
        <tr><td>电话</td><td>{{ phone }}</td></tr>
    </table>
</div>
{% endblock %}
